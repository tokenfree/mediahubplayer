<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="favicon.ico" rel="icon" type="image/x-icon">
<title>MediaHub Player</title>
<style>
    @font-face {
        font-family: "Signifier";
        src: url("fonts/TestSignifier-Regular.otf") format("opentype");
        font-weight: 400;
        font-style: normal;
    }

    :root {
        color-scheme: light dark;
        --black: #030303;
        --white: #ffffff;
        --paper: #060608;
        --line-dark: rgba(255, 255, 255, 0.12);
        --glass-dark: rgba(10, 10, 14, 0.82);
        --muted-light: rgba(255, 255, 255, 0.52);
        --bar-height: 76px;
        --control-height: 128px;
        --radius-btn: 10px;
        --radius-shell: 14px;
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; }

    body {
        margin: 0;
        overflow: hidden;
        background: var(--paper);
        color: var(--white);
        font-family: "Signifier", Georgia, serif;
        user-select: none;
        -webkit-user-select: none;
    }

    button, input { font: inherit; }

    button {
        border: 0;
        cursor: pointer;
    }

    button:focus-visible,
    input:focus-visible,
    .playlist-item:focus-visible {
        outline: 2px solid rgba(255,255,255,0.7);
        outline-offset: 3px;
        border-radius: var(--radius-btn);
    }

    /* ── App shell ── */
    .app-shell {
        position: relative;
        min-height: 100vh;
        display: grid;
        grid-template-rows: var(--bar-height) minmax(0, 1fr) var(--control-height);
        isolation: isolate;
    }

    /* ── Bars shared ── */
    .top-bar,
    .bottom-bar {
        position: relative;
        z-index: 5;
        display: flex;
        align-items: center;
        background: var(--glass-dark);
        color: var(--white);
        backdrop-filter: blur(36px) saturate(180%);
        -webkit-backdrop-filter: blur(36px) saturate(180%);
    }

    /* top gloss line */
    .top-bar::after,
    .bottom-bar::before {
        content: "";
        position: absolute;
        left: 0; right: 0;
        height: 1px;
        background: linear-gradient(90deg,
            transparent 0%,
            rgba(255,255,255,0.18) 20%,
            rgba(255,255,255,0.28) 50%,
            rgba(255,255,255,0.18) 80%,
            transparent 100%);
        pointer-events: none;
    }
    .top-bar::after  { bottom: 0; }
    .bottom-bar::before { top: 0; }

    .top-bar {
        justify-content: space-between;
        padding: 0 clamp(16px, 3vw, 40px);
        box-shadow:
            0 1px 0 rgba(255,255,255,0.06),
            0 20px 60px rgba(0,0,0,0.55);
    }

    /* ── Brand ── */
    .brand {
        display: flex;
        align-items: center;
        gap: 14px;
        min-width: 0;
    }

    .brand-mark {
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        border-radius: var(--radius-btn);
        border: 1px solid rgba(255,255,255,0.22);
        background: linear-gradient(160deg,
            rgba(255,255,255,0.14) 0%,
            rgba(255,255,255,0.04) 100%);
        box-shadow:
            inset 0 1px 0 rgba(255,255,255,0.18),
            0 4px 16px rgba(0,0,0,0.38);
    }

    .brand-text { min-width: 0; }

    .brand-title {
        margin: 0;
        overflow: hidden;
        font-size: 15px;
        font-weight: 700;
        line-height: 1.1;
        text-overflow: ellipsis;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        white-space: nowrap;
    }

    .brand-subtitle {
        margin: 5px 0 0;
        color: var(--muted-light);
        font-size: 10px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        white-space: nowrap;
    }

    /* ── Buttons ── */
    .top-actions,
    .control-cluster {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .icon-button,
    .transport-button {
        width: 46px;
        height: 46px;
        display: grid;
        place-items: center;
        border-radius: var(--radius-btn);
        border: 1px solid rgba(255,255,255,0.14);
        background: linear-gradient(160deg,
            rgba(255,255,255,0.1) 0%,
            rgba(255,255,255,0.03) 100%);
        color: var(--white);
        box-shadow:
            inset 0 1px 0 rgba(255,255,255,0.14),
            0 2px 10px rgba(0,0,0,0.28);
        transition:
            background 130ms ease,
            border-color 130ms ease,
            box-shadow 130ms ease,
            transform 100ms ease;
    }

    .transport-button {
        width: 50px;
        height: 50px;
    }

    .transport-button.primary {
        width: 58px;
        height: 58px;
        background: linear-gradient(160deg,
            rgba(255,255,255,0.98) 0%,
            rgba(220,220,220,0.92) 100%);
        border: 1px solid rgba(255,255,255,0.6);
        color: var(--black);
        box-shadow:
            inset 0 1px 0 rgba(255,255,255,1),
            0 4px 20px rgba(0,0,0,0.42),
            0 0 0 1px rgba(255,255,255,0.08);
    }

    .icon-button:hover,
    .transport-button:hover {
        background: linear-gradient(160deg,
            rgba(255,255,255,0.2) 0%,
            rgba(255,255,255,0.08) 100%);
        border-color: rgba(255,255,255,0.32);
        box-shadow:
            inset 0 1px 0 rgba(255,255,255,0.22),
            0 4px 16px rgba(0,0,0,0.36);
    }

    .transport-button.primary:hover {
        background: linear-gradient(160deg, #fff 0%, #e8e8e8 100%);
        box-shadow:
            inset 0 1px 0 rgba(255,255,255,1),
            0 6px 24px rgba(0,0,0,0.48);
    }

    .icon-button:active,
    .transport-button:active {
        transform: translateY(1px) scale(0.97);
        box-shadow:
            inset 0 1px 4px rgba(0,0,0,0.18),
            0 1px 4px rgba(0,0,0,0.2);
    }

    .icon-button:disabled,
    .transport-button:disabled {
        cursor: default;
        opacity: 0.3;
        transform: none;
    }

    .icon {
        width: 20px;
        height: 20px;
        display: block;
        fill: none;
        stroke: currentColor;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 1.8;
    }

    .icon-fill {
        fill: currentColor;
        stroke: none;
    }

    /* ── Player zone ── */
    .player-zone {
        position: relative;
        z-index: 1;
        min-height: 0;
        display: grid;
        place-items: center;
        padding: clamp(14px, 2.6vw, 32px);
        background: #060608;
    }

    .video-shell {
        width: min(calc(100vw - clamp(28px, 5.2vw, 64px)), calc((100vh - var(--bar-height) - var(--control-height) - 56px) * 16 / 9));
        max-width: 1500px;
        aspect-ratio: 16 / 9;
        position: relative;
        border: 1px solid rgba(255,255,255,0.16);
        background: #000;
        box-shadow:
            0 40px 120px rgba(0,0,0,0.88),
            inset 0 1px 0 rgba(255,255,255,0.1),
            inset 0 -1px 0 rgba(255,255,255,0.03);
    }

    .video-frame {
        position: absolute;
        inset: 0;
        overflow: hidden;
        background: #000;
        box-shadow: inset 0 0 60px rgba(0,0,0,0.9);
    }

    .video-slot {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        background: #000;
        object-fit: contain;
        opacity: 0;
        pointer-events: none;
        transition: opacity 170ms ease;
        will-change: opacity;
    }

    .video-slot.is-active {
        opacity: 1;
        pointer-events: auto;
    }

    /* ── Empty state ── */
    .empty-state {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        background: #080809;
        color: var(--white);
        opacity: 1;
        transition: opacity 160ms ease, visibility 160ms ease;
    }

    .empty-state.is-hidden {
        visibility: hidden;
        opacity: 0;
    }

    .empty-panel {
        width: min(380px, calc(100% - 34px));
        border-radius: 16px;
        border: 1px solid rgba(255,255,255,0.14);
        background: linear-gradient(160deg,
            rgba(255,255,255,0.07) 0%,
            rgba(255,255,255,0.02) 100%);
        padding: 28px;
        text-align: center;
        box-shadow:
            0 24px 80px rgba(0,0,0,0.6),
            inset 0 1px 0 rgba(255,255,255,0.12);
        backdrop-filter: blur(28px) saturate(160%);
        -webkit-backdrop-filter: blur(28px) saturate(160%);
    }

    .empty-title {
        margin: 0 0 20px;
        font-size: clamp(22px, 4vw, 42px);
        font-weight: 700;
        line-height: 1;
        text-transform: uppercase;
        letter-spacing: 0.08em;
    }

    .load-large {
        width: 100%;
        height: 52px;
        display: inline-grid;
        place-items: center;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.6);
        background: linear-gradient(160deg, #fff 0%, #ddd 100%);
        color: var(--black);
        font-weight: 700;
        font-size: 12px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        box-shadow:
            inset 0 1px 0 rgba(255,255,255,1),
            0 4px 20px rgba(0,0,0,0.32);
        transition: background 130ms ease, box-shadow 130ms ease;
    }

    .load-large:hover {
        background: linear-gradient(160deg, #fff 0%, #eee 100%);
        box-shadow:
            inset 0 1px 0 rgba(255,255,255,1),
            0 6px 28px rgba(0,0,0,0.44);
    }

    /* ── Loading line ── */
    .loading-line {
        position: absolute;
        left: 0; right: 0; bottom: 0;
        height: 2px;
        overflow: hidden;
        background: rgba(255,255,255,0.1);
        border-radius: 0 0 var(--radius-shell) var(--radius-shell);
        opacity: 0;
        transition: opacity 120ms ease;
    }

    .loading-line.is-visible { opacity: 1; }

    .loading-line::before {
        content: "";
        position: absolute;
        top: 0; bottom: 0;
        left: -40%; width: 40%;
        background: linear-gradient(90deg, transparent, var(--white), transparent);
        border-radius: 2px;
        animation: loadingSweep 900ms ease-in-out infinite;
    }

    @keyframes loadingSweep {
        from { transform: translateX(0); }
        to   { transform: translateX(350%); }
    }

    /* ── Bottom bar ── */
    .bottom-bar {
        flex-direction: column;
        justify-content: center;
        gap: 12px;
        padding: 14px clamp(16px, 3vw, 40px);
        box-shadow:
            0 -1px 0 rgba(255,255,255,0.06),
            0 -24px 72px rgba(0,0,0,0.7);
    }

    .meta-row,
    .control-row {
        width: min(1440px, 100%);
        display: grid;
        align-items: center;
        gap: 16px;
    }

    .meta-row { grid-template-columns: minmax(0, 1fr) auto; }

    .track-title {
        min-width: 0;
        overflow: hidden;
        color: rgba(255,255,255,0.88);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-overflow: ellipsis;
        text-transform: uppercase;
        white-space: nowrap;
    }

    .counter {
        color: var(--muted-light);
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        white-space: nowrap;
    }

    .control-row { grid-template-columns: auto minmax(160px, 1fr) auto; }

    /* ── Progress / timeline ── */
    .timeline {
        display: grid;
        grid-template-columns: 52px minmax(0, 1fr) 52px;
        align-items: center;
        gap: 10px;
        min-width: 0;
    }

    .time-label {
        color: var(--muted-light);
        font-variant-numeric: tabular-nums;
        font-size: 11px;
        text-align: center;
    }

    input[type="range"] {
        width: 100%;
        height: 20px;
        margin: 0;
        appearance: none;
        -webkit-appearance: none;
        background: transparent;
        cursor: pointer;
    }

    /* progress track */
    #progress::-webkit-slider-runnable-track {
        height: 4px;
        border-radius: 2px;
        border: none;
        background: linear-gradient(90deg,
            rgba(255,255,255,0.9) var(--range, 0%),
            rgba(255,255,255,0.14) var(--range, 0%));
        box-shadow: inset 0 1px 0 rgba(0,0,0,0.2);
    }

    #progress::-webkit-slider-thumb {
        width: 14px;
        height: 14px;
        margin-top: -5px;
        appearance: none;
        -webkit-appearance: none;
        border: none;
        border-radius: 50%;
        background: radial-gradient(circle at 40% 35%, #fff 0%, #d8d8d8 100%);
        box-shadow:
            0 0 0 2px rgba(255,255,255,0.18),
            0 2px 8px rgba(0,0,0,0.5);
        transition: transform 120ms ease, box-shadow 120ms ease;
    }

    #progress:hover::-webkit-slider-thumb {
        transform: scale(1.2);
        box-shadow:
            0 0 0 3px rgba(255,255,255,0.24),
            0 4px 12px rgba(0,0,0,0.6);
    }

    #progress::-moz-range-track {
        height: 4px;
        border-radius: 2px;
        border: none;
        background: rgba(255,255,255,0.14);
    }

    #progress::-moz-range-progress {
        height: 4px;
        border-radius: 2px;
        background: rgba(255,255,255,0.9);
    }

    #progress::-moz-range-thumb {
        width: 14px;
        height: 14px;
        border: none;
        border-radius: 50%;
        background: radial-gradient(circle at 40% 35%, #fff 0%, #d8d8d8 100%);
        box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    /* ── Volume group ── */
    .volume-group {
        display: grid;
        grid-template-columns: auto minmax(80px, 110px) auto;
        align-items: center;
        gap: 10px;
    }

    /* Glass pill container */
    .volume-track-wrap {
        position: relative;
        height: 6px;
        border-radius: 3px;
        background: rgba(255,255,255,0.12);
        box-shadow:
            inset 0 1px 2px rgba(0,0,0,0.4),
            0 1px 0 rgba(255,255,255,0.06);
        overflow: visible;
    }

    /* Filled portion */
    .volume-fill {
        position: absolute;
        left: 0; top: 0; bottom: 0;
        width: 100%;
        border-radius: 3px;
        background: linear-gradient(90deg,
            rgba(255,255,255,0.85) 0%,
            rgba(255,255,255,0.6) 100%);
        pointer-events: none;
        transition: width 40ms linear;
    }

    /* Volume range sits over the pill */
    #volume {
        position: absolute;
        inset: -8px 0;         /* generous hit area */
        width: 100%;
        height: calc(100% + 16px);
        margin: 0;
        appearance: none;
        -webkit-appearance: none;
        background: transparent;
        cursor: pointer;
        z-index: 2;
    }

    #volume::-webkit-slider-runnable-track {
        height: 0;
        background: transparent;
        border: none;
    }

    #volume::-webkit-slider-thumb {
        width: 0;
        height: 0;
        appearance: none;
        -webkit-appearance: none;
        border: none;
        background: transparent;
        box-shadow: none;
    }

    #volume::-moz-range-track {
        height: 0;
        background: transparent;
        border: none;
    }

    #volume::-moz-range-thumb {
        width: 0;
        height: 0;
        border: none;
        background: transparent;
        box-shadow: none;
    }

    /* ── Playlist panel ── */
    .playlist-panel {
        position: fixed;
        top: var(--bar-height);
        right: 0;
        bottom: var(--control-height);
        z-index: 8;
        width: min(400px, 92vw);
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        border-left: 1px solid rgba(255,255,255,0.12);
        background: rgba(8, 8, 12, 0.86);
        color: var(--white);
        box-shadow: -28px 0 100px rgba(0,0,0,0.78);
        backdrop-filter: blur(36px) saturate(160%);
        -webkit-backdrop-filter: blur(36px) saturate(160%);
        transform: translateX(100%);
        transition: transform 200ms cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .playlist-panel.is-open { transform: translateX(0); }

    .playlist-head {
        min-height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 14px 18px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .playlist-title {
        margin: 0;
        font-size: 11px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--muted-light);
    }

    .playlist-list {
        margin: 0;
        padding: 0;
        overflow: auto;
        list-style: none;
    }

    .playlist-list::-webkit-scrollbar { width: 4px; }
    .playlist-list::-webkit-scrollbar-track { background: transparent; }
    .playlist-list::-webkit-scrollbar-thumb {
        background: rgba(255,255,255,0.28);
        border-radius: 2px;
    }

    .playlist-item {
        display: grid;
        grid-template-columns: 44px minmax(0, 1fr);
        gap: 12px;
        align-items: center;
        min-height: 60px;
        padding: 12px 18px;
        border-bottom: 1px solid rgba(255,255,255,0.07);
        cursor: pointer;
        transition: background 120ms ease;
    }

    .playlist-item:hover { background: rgba(255,255,255,0.07); }

    .playlist-item.is-current {
        background: rgba(255,255,255,0.1);
        box-shadow: inset 3px 0 0 rgba(255,255,255,0.7);
    }

    .playlist-index {
        color: var(--muted-light);
        font-size: 11px;
        letter-spacing: 0.14em;
    }

    .playlist-name {
        min-width: 0;
        overflow: hidden;
        font-size: 12px;
        font-weight: 700;
        line-height: 1.3;
        text-overflow: ellipsis;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        white-space: nowrap;
    }

    /* ── Drop overlay ── */
    .drop-overlay {
        position: fixed;
        inset: var(--bar-height) 0 var(--control-height);
        z-index: 20;
        display: grid;
        place-items: center;
        border: 1px solid rgba(255,255,255,0.28);
        background: rgba(6,6,10,0.88);
        color: var(--white);
        font-size: clamp(32px, 8vw, 96px);
        font-weight: 700;
        letter-spacing: 0.08em;
        opacity: 0;
        pointer-events: none;
        text-transform: uppercase;
        transition: opacity 140ms ease;
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
    }

    .drop-overlay.is-visible { opacity: 1; }

    #file-input { display: none; }

    /* ── Responsive ── */
    @media (max-width: 900px) {
        :root {
            --bar-height: 64px;
            --control-height: 160px;
        }

        .brand-subtitle, .volume-group { display: none; }

        .control-row {
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .control-cluster { justify-content: center; }

        .timeline {
            grid-template-columns: 40px minmax(0, 1fr) 40px;
            order: -1;
        }

        .icon-button { width: 42px; height: 42px; }

        .player-zone { padding: 10px; }

        .video-shell { width: calc(100vw - 20px); }
    }

    @media (max-width: 560px) {
        :root { --control-height: 174px; }

        .brand-title { max-width: 120px; }

        .transport-button { width: 46px; height: 46px; }
        .transport-button.primary { width: 54px; height: 54px; }

        .meta-row {
            grid-template-columns: 1fr;
            gap: 4px;
            text-align: center;
        }

        .counter { justify-self: center; }
    }

    @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
            scroll-behavior: auto !important;
            transition-duration: 1ms !important;
            animation-duration: 1ms !important;
            animation-iteration-count: 1 !important;
        }
    }
</style>
</head>
<body>
<div class="app-shell" id="app-shell">
    <header class="top-bar">
        <div class="brand">
            <div class="brand-mark" aria-hidden="true">
                <svg class="icon icon-fill" viewBox="0 0 24 24">
                    <path d="M7 5v14l11-7z"></path>
                </svg>
            </div>
            <div class="brand-text">
                <p class="brand-title">MediaHub</p>
                <p class="brand-subtitle">Video Player</p>
            </div>
        </div>
        <div class="top-actions">
            <button class="icon-button" id="load-button" type="button" aria-label="Load videos" title="Load videos">
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 3v12"></path>
                    <path d="M7 8l5-5 5 5"></path>
                    <path d="M5 15v5h14v-5"></path>
                </svg>
            </button>
            <button class="icon-button" id="playlist-button" type="button" aria-label="Playlist" title="Playlist" disabled>
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M8 6h13"></path>
                    <path d="M8 12h13"></path>
                    <path d="M8 18h13"></path>
                    <path d="M3 6h1"></path>
                    <path d="M3 12h1"></path>
                    <path d="M3 18h1"></path>
                </svg>
            </button>
        </div>
    </header>

    <main class="player-zone">
        <section class="video-shell" aria-label="MediaHub video player">
            <div class="video-frame" id="video-frame">
                <video class="video-slot is-active" playsinline preload="metadata"></video>
                <video class="video-slot" playsinline preload="metadata"></video>
                <div class="empty-state" id="empty-state">
                    <div class="empty-panel">
                        <h1 class="empty-title">MediaHub</h1>
                        <button class="load-large" id="empty-load-button" type="button">Load Videos</button>
                    </div>
                </div>
                <div class="loading-line" id="loading-line" aria-hidden="true"></div>
            </div>
        </section>
    </main>

    <footer class="bottom-bar">
        <div class="meta-row">
            <div class="track-title" id="track-title">No video loaded</div>
            <div class="counter" id="counter">0 / 0</div>
        </div>
        <div class="control-row">
            <div class="control-cluster">
                <button class="transport-button" id="previous-button" type="button" aria-label="Previous video" title="Previous video" disabled>
                    <svg class="icon icon-fill" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M6 5h2v14H6z"></path>
                        <path d="M19 5v14l-10-7z"></path>
                    </svg>
                </button>
                <button class="transport-button primary" id="play-button" type="button" aria-label="Play" title="Play" disabled>
                    <svg class="icon icon-fill play-icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M7 5v14l11-7z"></path>
                    </svg>
                </button>
                <button class="transport-button" id="next-button" type="button" aria-label="Next video" title="Next video" disabled>
                    <svg class="icon icon-fill" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M16 5h2v14h-2z"></path>
                        <path d="M5 5v14l10-7z"></path>
                    </svg>
                </button>
            </div>

            <div class="timeline">
                <span class="time-label" id="current-time">0:00</span>
                <input id="progress" type="range" min="0" max="1000" value="0" aria-label="Timeline" disabled>
                <span class="time-label" id="duration">0:00</span>
            </div>

            <div class="volume-group">
                <button class="icon-button" id="mute-button" type="button" aria-label="Mute" title="Mute" disabled>
                    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M4 9v6h4l5 4V5L8 9z"></path>
                        <path class="volume-wave" d="M17 9l3 3-3 3"></path>
                    </svg>
                </button>
                <div class="volume-track-wrap">
                    <div class="volume-fill" id="volume-fill"></div>
                    <input id="volume" type="range" min="0" max="1" step="0.01" value="1" aria-label="Volume" disabled>
                </div>
                <button class="icon-button" id="fullscreen-button" type="button" aria-label="Fullscreen" title="Fullscreen" disabled>
                    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M4 9V4h5"></path>
                        <path d="M20 9V4h-5"></path>
                        <path d="M4 15v5h5"></path>
                        <path d="M20 15v5h-5"></path>
                    </svg>
                </button>
            </div>
        </div>
    </footer>
</div>

<aside class="playlist-panel" id="playlist-panel" aria-hidden="true">
    <div class="playlist-head">
        <h2 class="playlist-title">Playlist</h2>
        <button class="icon-button" id="close-playlist-button" type="button" aria-label="Close playlist" title="Close playlist">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M6 6l12 12"></path>
                <path d="M18 6L6 18"></path>
            </svg>
        </button>
    </div>
    <ul class="playlist-list" id="playlist-list"></ul>
</aside>

<div class="drop-overlay" id="drop-overlay">Drop</div>
<input type="file" id="file-input" multiple accept="video/*">

<script>
(() => {
    const appShell   = document.getElementById("app-shell");
    const volumeFill = document.getElementById("volume-fill");
    const fileInput  = document.getElementById("file-input");
    const videoEls   = Array.from(document.querySelectorAll(".video-slot"));
    const emptyState = document.getElementById("empty-state");
    const loadingLine= document.getElementById("loading-line");
    const trackTitle = document.getElementById("track-title");
    const counter    = document.getElementById("counter");
    const progress   = document.getElementById("progress");
    const currentTimeLabel = document.getElementById("current-time");
    const durationLabel    = document.getElementById("duration");
    const volume     = document.getElementById("volume");
    const playlistPanel = document.getElementById("playlist-panel");
    const playlistList  = document.getElementById("playlist-list");
    const dropOverlay   = document.getElementById("drop-overlay");

    const buttons = {
        load         : document.getElementById("load-button"),
        emptyLoad    : document.getElementById("empty-load-button"),
        playlist     : document.getElementById("playlist-button"),
        closePlaylist: document.getElementById("close-playlist-button"),
        previous     : document.getElementById("previous-button"),
        play         : document.getElementById("play-button"),
        next         : document.getElementById("next-button"),
        mute         : document.getElementById("mute-button"),
        fullscreen   : document.getElementById("fullscreen-button")
    };

    const playIcon  = '<svg class="icon icon-fill play-icon"  viewBox="0 0 24 24" aria-hidden="true"><path d="M7 5v14l11-7z"></path></svg>';
    const pauseIcon = '<svg class="icon icon-fill pause-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 5h4v14H6z"></path><path d="M14 5h4v14h-4z"></path></svg>';
    const volumeIcon= '<svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 9v6h4l5 4V5L8 9z"></path><path d="M17 9l3 3-3 3"></path></svg>';
    const mutedIcon = '<svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 9v6h4l5 4V5L8 9z"></path><path d="M18 9l-4 6"></path><path d="M14 9l4 6"></path></svg>';

    let videos = [], currentIndex = -1, activeSlot = 0;
    let transitionToken = 0, userWantsPlayback = false, dragDepth = 0;

    const formatTime = (s) => {
        if (!Number.isFinite(s) || s < 0) return "0:00";
        const t = Math.floor(s);
        const h = Math.floor(t / 3600);
        const m = Math.floor((t % 3600) / 60);
        const r = t % 60;
        if (h > 0) return `${h}:${String(m).padStart(2,"0")}:${String(r).padStart(2,"0")}`;
        return `${m}:${String(r).padStart(2,"0")}`;
    };

    const getActiveVideo = () => videoEls[activeSlot];

    const setRangeFill = (input, percent) => {
        input.style.setProperty("--range", `${Math.max(0, Math.min(100, percent))}%`);
    };

    const setVolumeFill = (val) => {
        volumeFill.style.width = `${Math.round(Math.max(0, Math.min(1, val)) * 100)}%`;
    };

    const wrapIndex = (i) => videos.length ? (i + videos.length) % videos.length : -1;

    const setControlsEnabled = (enabled) => {
        [buttons.play, buttons.previous, buttons.next,
         buttons.mute, buttons.fullscreen, buttons.playlist,
         progress, volume].forEach(c => { c.disabled = !enabled; });
    };

    const updatePlayButton = () => {
        const v = getActiveVideo();
        const playing = videos.length > 0 && !v.paused && !v.ended;
        buttons.play.innerHTML = playing ? pauseIcon : playIcon;
        buttons.play.setAttribute("aria-label", playing ? "Pause" : "Play");
        buttons.play.title = playing ? "Pause" : "Play";
    };

    const updateMuteButton = () => {
        const v = getActiveVideo();
        const muted = v.muted || v.volume === 0;
        buttons.mute.innerHTML = muted ? mutedIcon : volumeIcon;
        buttons.mute.setAttribute("aria-label", muted ? "Unmute" : "Mute");
        buttons.mute.title = muted ? "Unmute" : "Mute";
    };

    const updateTimeline = () => {
        const v = getActiveVideo();
        const dur = v.duration || 0, cur = v.currentTime || 0;
        const pct = dur ? (cur / dur) * 100 : 0;
        progress.value = dur ? Math.round((cur / dur) * Number(progress.max)) : 0;
        currentTimeLabel.textContent = formatTime(cur);
        durationLabel.textContent    = formatTime(dur);
        setRangeFill(progress, pct);
    };

    const updateMeta = () => {
        const has = videos.length > 0;
        const cur = has && currentIndex >= 0 ? videos[currentIndex] : null;
        trackTitle.textContent = cur ? cur.name : "No video loaded";
        counter.textContent    = cur ? `${currentIndex + 1} / ${videos.length}` : "0 / 0";
        emptyState.classList.toggle("is-hidden", has);
        setControlsEnabled(has);
        updatePlayButton();
        updateMuteButton();
    };

    const syncMediaSettings = (video) => {
        const av = getActiveVideo();
        video.volume    = Number(volume.value);
        video.muted     = av.muted;
        video.playsInline = true;
    };

    const stopInactiveVideo = (slot) => {
        const v = videoEls[slot];
        v.pause();
        v.removeAttribute("src");
        v.load();
    };

    const renderPlaylist = () => {
        const frag = document.createDocumentFragment();
        videos.forEach((video, i) => {
            const li  = document.createElement("li");
            const idx = document.createElement("span");
            const nm  = document.createElement("span");
            li.className  = `playlist-item${i === currentIndex ? " is-current" : ""}`;
            li.tabIndex   = 0;
            li.dataset.index = String(i);
            idx.className = "playlist-index";
            idx.textContent = String(i + 1).padStart(2, "0");
            nm.className  = "playlist-name";
            nm.textContent = video.name;
            li.append(idx, nm);
            frag.append(li);
        });
        playlistList.replaceChildren(frag);
    };

    const showLoading = (show) => loadingLine.classList.toggle("is-visible", show);

    const attemptPlay = async (video) => {
        try { await video.play(); }
        catch { userWantsPlayback = false; }
        finally { updatePlayButton(); }
    };

    const switchToVideo = (index, opts = {}) => {
        const next = wrapIndex(index);
        if (next < 0) return;

        const outSlot = activeSlot, inSlot = 1 - activeSlot;
        const outgoing = videoEls[outSlot], incoming = videoEls[inSlot];
        const nextVideo = videos[next];
        const shouldPlay = opts.autoplay || userWantsPlayback || !outgoing.paused;
        const token = ++transitionToken;
        const firstLoad = currentIndex === -1 || opts.instant;

        showLoading(true);
        incoming.pause();
        incoming.classList.remove("is-active");
        incoming.removeAttribute("src");
        incoming.load();
        syncMediaSettings(incoming);
        incoming.src = nextVideo.url;
        incoming.currentTime = 0;
        incoming.preload = "auto";
        incoming.load();

        const finish = () => {
            if (token !== transitionToken) return;
            currentIndex = next;
            activeSlot   = inSlot;
            incoming.classList.add("is-active");
            outgoing.classList.remove("is-active");
            window.setTimeout(() => {
                if (activeSlot !== outSlot) stopInactiveVideo(outSlot);
            }, firstLoad ? 0 : 190);
            showLoading(false);
            updateMeta(); updateTimeline(); renderPlaylist();
            if (shouldPlay) { userWantsPlayback = true; attemptPlay(incoming); }
        };

        const fail = () => { if (token === transitionToken) showLoading(false); };

        incoming.addEventListener("loadeddata", finish, { once: true });
        incoming.addEventListener("error",      fail,   { once: true });
    };

    const togglePlayback = () => {
        if (!videos.length) { fileInput.click(); return; }
        const v = getActiveVideo();
        if (v.paused || v.ended) { userWantsPlayback = true; attemptPlay(v); }
        else { userWantsPlayback = false; v.pause(); updatePlayButton(); }
    };

    const addVideos = (files) => {
        const vFiles = Array.from(files).filter(f => f.type.startsWith("video/"));
        if (!vFiles.length) return;
        const wasEmpty = videos.length === 0;
        const startIdx = videos.length;
        videos = videos.concat(vFiles.map(f => ({
            file: f,
            name: f.name.replace(/\.[^/.]+$/, "") || f.name,
            url:  URL.createObjectURL(f)
        })));
        updateMeta(); renderPlaylist();
        if (wasEmpty) { userWantsPlayback = true; switchToVideo(startIdx, { autoplay: true, instant: true }); }
    };

    const togglePlaylist = (force) => {
        const open = typeof force === "boolean" ? force : !playlistPanel.classList.contains("is-open");
        playlistPanel.classList.toggle("is-open", open);
        playlistPanel.setAttribute("aria-hidden", String(!open));
    };

    const goToOffset = (offset) => { if (videos.length) switchToVideo(currentIndex + offset); };

    const seekToProgress = () => {
        const v = getActiveVideo();
        if (!v.duration) return;
        v.currentTime = (Number(progress.value) / Number(progress.max)) * v.duration;
        updateTimeline();
    };

    const toggleMute = () => {
        const v = getActiveVideo();
        v.muted = !v.muted;
        updateMuteButton();
    };

    const setVolume = () => {
        const v = getActiveVideo();
        v.volume = Number(volume.value);
        v.muted  = v.volume === 0;
        setVolumeFill(v.volume);
        updateMuteButton();
    };

    const toggleFullscreen = async () => {
        if (!document.fullscreenElement) await appShell.requestFullscreen();
        else await document.exitFullscreen();
    };

    const clearDropState = () => { dragDepth = 0; dropOverlay.classList.remove("is-visible"); };

    videoEls.forEach(video => {
        video.addEventListener("timeupdate",    () => { if (video === getActiveVideo()) updateTimeline(); });
        video.addEventListener("durationchange", updateTimeline);
        video.addEventListener("play",           updatePlayButton);
        video.addEventListener("pause",          updatePlayButton);
        video.addEventListener("ended", () => { updatePlayButton(); if (videos.length > 1) goToOffset(1); });
        video.addEventListener("click",          togglePlayback);
        video.addEventListener("dblclick",       toggleFullscreen);
    });

    buttons.load.addEventListener("click",          () => fileInput.click());
    buttons.emptyLoad.addEventListener("click",     () => fileInput.click());
    buttons.play.addEventListener("click",           togglePlayback);
    buttons.previous.addEventListener("click",       () => goToOffset(-1));
    buttons.next.addEventListener("click",           () => goToOffset(1));
    buttons.playlist.addEventListener("click",       () => togglePlaylist());
    buttons.closePlaylist.addEventListener("click",  () => togglePlaylist(false));
    buttons.mute.addEventListener("click",           toggleMute);
    buttons.fullscreen.addEventListener("click",     toggleFullscreen);
    progress.addEventListener("input",               seekToProgress);
    volume.addEventListener("input",                 setVolume);

    fileInput.addEventListener("change", e => { addVideos(e.target.files); fileInput.value = ""; });

    playlistList.addEventListener("click", e => {
        const item = e.target.closest(".playlist-item");
        if (!item) return;
        switchToVideo(Number(item.dataset.index));
        togglePlaylist(false);
    });

    playlistList.addEventListener("keydown", e => {
        if (e.key !== "Enter" && e.key !== " ") return;
        const item = e.target.closest(".playlist-item");
        if (!item) return;
        e.preventDefault();
        switchToVideo(Number(item.dataset.index));
        togglePlaylist(false);
    });

    document.addEventListener("keydown", e => {
        const tag = document.activeElement.tagName.toLowerCase();
        if (tag === "input" && document.activeElement.type !== "range") return;
        if (e.key === " ")           { e.preventDefault(); togglePlayback(); }
        else if (e.key === "ArrowRight") goToOffset(1);
        else if (e.key === "ArrowLeft")  goToOffset(-1);
        else if (e.key === "Escape")     togglePlaylist(false);
    });

    document.addEventListener("dragenter", e => { e.preventDefault(); dragDepth++; dropOverlay.classList.add("is-visible"); });
    document.addEventListener("dragover",  e => e.preventDefault());
    document.addEventListener("dragleave", e => { e.preventDefault(); dragDepth = Math.max(0, dragDepth - 1); if (!dragDepth) clearDropState(); });
    document.addEventListener("drop",      e => { e.preventDefault(); clearDropState(); addVideos(e.dataTransfer.files); });

    window.addEventListener("beforeunload", () => videos.forEach(v => URL.revokeObjectURL(v.url)));

    setRangeFill(progress, 0);
    setVolumeFill(1);
    updateMeta();
})();
</script>
</body>
</html>
